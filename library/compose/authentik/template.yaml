kind: compose
schema: "1.2"

metadata:
  name: authentik
  description: |
    Open-source Identity Provider supporting SSO, MFA, and OAuth2/OIDC.
    [Documentation](https://docs.goauthentik.io) · [Repository](https://github.com/goauthentik/authentik)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [auth, sso, identity, selfhosted]
  icon:
    provider: selfh
    id: authentik
  draft: false

spec:
  general:
    title: General
    vars:
      service_name:
        type: str
        description: "Container name prefix for all authentik services"
        default: authentik
        required: false
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: unless-stopped
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  authentik:
    title: Authentik
    vars:
      authentik_image:
        type: str
        description: "Authentik Docker image"
        default: ghcr.io/goauthentik/server
        required: false
      authentik_tag:
        type: str
        description: "Authentik image tag/version"
        default: 2024.2.2
        required: false

  database:
    title: Database
    vars:
      pg_user:
        type: str
        description: "PostgreSQL username"
        default: authentik
        required: false
      pg_db:
        type: str
        description: "PostgreSQL database name"
        default: authentik
        required: false
      pg_pass:
        type: str
        description: "PostgreSQL password"
        default: ""
        required: true
        sensitive: true

  traefik:
    title: Traefik
    toggle: traefik_enabled
    vars:
      traefik_enabled:
        type: bool
        description: "Enable Traefik reverse proxy integration"
        default: true
        required: false
      traefik_host:
        type: str
        description: "Subdomain for Traefik routing (e.g. auth)"
        default: auth
        required: false
        needs:
          - traefik_enabled=true
      traefik_domain:
        type: str
        description: "Base domain for Traefik routing (e.g. home.example.com)"
        default: home.example.com
        required: false
        needs:
          - traefik_enabled=true
      traefik_network:
        type: str
        description: "External Traefik network name"
        default: proxy
        required: false
        needs:
          - traefik_enabled=true

  traefik_tls:
    title: Traefik TLS
    toggle: traefik_tls_enabled
    needs: traefik
    vars:
      traefik_tls_enabled:
        type: bool
        description: "Enable TLS via certificate resolver"
        default: false
        required: false
      cert_resolver:
        type: str
        description: "Traefik certificate resolver name"
        default: cloudflare
        required: false
        needs:
          - traefik_tls_enabled=true

  volume:
    title: Volume
    vars:
      volume_mode:
        type: enum
        description: "Media storage volume mode"
        options: [local, mount, nfs]
        default: local
        required: true
      volume_mount_path:
        type: str
        description: "Host path for bind mount"
        default: /mnt/storage
        required: true
        needs:
          - volume_mode=mount
      volume_nfs_server:
        type: str
        description: "NFS server address"
        default: 192.168.1.1
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_path:
        type: str
        description: "NFS export path"
        default: /export
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_options:
        type: str
        description: "NFS mount options"
        default: rw,nolock,soft
        required: true
        needs:
          - volume_mode=nfs

  ports:
    title: Ports
    vars:
      port_http:
        type: int
        description: "HTTP port (used when Traefik is disabled)"
        default: 9000
        required: false
      port_https:
        type: int
        description: "HTTPS port (used when Traefik is disabled)"
        default: 9443
        required: false

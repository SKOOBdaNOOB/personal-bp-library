kind: compose
schema: "1.2"

metadata:
  name: mailpit
  description: |
    Email testing tool with a built-in SMTP server and web UI for development and staging.
    [Documentation](https://mailpit.axllent.org/docs/) · [Repository](https://github.com/axllent/mailpit)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [email, smtp, testing, development, selfhosted]
  icon:
    provider: selfh
    id: mailpit
  draft: false

spec:
  general:
    title: General
    vars:
      service_name:
        type: str
        description: "Container name"
        default: mailpit
        required: false
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: unless-stopped
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  configuration:
    title: Configuration
    vars:
      max_messages:
        type: int
        description: "Maximum number of messages to retain before pruning"
        default: 5000
        required: false
      smtp_auth_accept_any:
        type: bool
        description: "Accept any SMTP authentication credentials (useful for dev/testing)"
        default: true
        required: false
      smtp_auth_allow_insecure:
        type: bool
        description: "Allow insecure (plain-text) SMTP authentication"
        default: true
        required: false

  ports:
    title: Ports
    vars:
      port_smtp:
        type: int
        description: "SMTP port (always exposed for use by other containers on the bridge network)"
        default: 1025
        required: false
      port_http:
        type: int
        description: "Web UI port (used when Traefik is disabled)"
        default: 8025
        required: false

  traefik:
    title: Traefik
    toggle: traefik_enabled
    vars:
      traefik_enabled:
        type: bool
        description: "Enable Traefik reverse proxy integration for the web UI"
        default: true
        required: false
      traefik_host:
        type: str
        description: "Subdomain for Traefik routing (e.g. mailpit)"
        default: mailpit
        required: false
        needs:
          - traefik_enabled=true
      traefik_domain:
        type: str
        description: "Base domain for Traefik routing (e.g. home.example.com)"
        default: home.example.com
        required: false
        needs:
          - traefik_enabled=true
      traefik_network:
        type: str
        description: "External Traefik network name"
        default: proxy
        required: false
        needs:
          - traefik_enabled=true

  traefik_tls:
    title: Traefik TLS
    toggle: traefik_tls_enabled
    needs: traefik
    vars:
      traefik_tls_enabled:
        type: bool
        description: "Enable TLS via certificate resolver"
        default: false
        required: false
      cert_resolver:
        type: str
        description: "Traefik certificate resolver name"
        default: cloudflare
        required: false
        needs:
          - traefik_tls_enabled=true

  network:
    title: Network
    vars:
      bridge_network:
        type: str
        description: "Internal bridge network name for SMTP clients to connect through"
        default: mailpit-bridge
        required: false

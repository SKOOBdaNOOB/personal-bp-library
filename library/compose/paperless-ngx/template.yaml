kind: compose
schema: "1.2"

metadata:
  name: paperless-ngx
  description: |
    Self-hosted document management system with OCR, tagging, and full-text search.
    [Documentation](https://docs.paperless-ngx.com/) · [Repository](https://github.com/paperless-ngx/paperless-ngx)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [documents, ocr, selfhosted, archive]
  icon:
    provider: selfh
    id: paperless-ngx
  draft: false

spec:
  general:
    title: General
    vars:
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: unless-stopped
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  database:
    title: Database
    vars:
      pg_db:
        type: str
        description: "PostgreSQL database name"
        default: paperless
        required: false
      pg_user:
        type: str
        description: "PostgreSQL username"
        default: paperless
        required: false
      pg_pass:
        type: str
        description: "PostgreSQL password"
        default: ""
        required: true
        sensitive: true

  paperless:
    title: Paperless
    vars:
      secret_key:
        type: str
        description: "Django secret key for cryptographic signing (generate a random 50-char string)"
        default: ""
        required: true
        sensitive: true
      admin_user:
        type: str
        description: "Initial admin username"
        default: admin
        required: false
      admin_mail:
        type: str
        description: "Initial admin email address"
        default: admin@example.com
        required: false
      ocr_language:
        type: str
        description: "Primary OCR language (ISO 639-2 code, e.g. eng, fra, deu)"
        default: eng
        required: false
      time_zone:
        type: str
        description: "Timezone for the application (tz database format)"
        default: America/New_York
        required: false

  traefik:
    title: Traefik
    toggle: traefik_enabled
    vars:
      traefik_enabled:
        type: bool
        description: "Enable Traefik reverse proxy integration"
        default: true
        required: false
      traefik_host:
        type: str
        description: "Subdomain for Traefik routing (e.g. paperless)"
        default: paperless
        required: false
        needs:
          - traefik_enabled=true
      traefik_domain:
        type: str
        description: "Base domain for Traefik routing (e.g. home.example.com)"
        default: home.example.com
        required: false
        needs:
          - traefik_enabled=true
      traefik_network:
        type: str
        description: "External Traefik network name"
        default: proxy
        required: false
        needs:
          - traefik_enabled=true

  traefik_tls:
    title: Traefik TLS
    toggle: traefik_tls_enabled
    needs: traefik
    vars:
      traefik_tls_enabled:
        type: bool
        description: "Enable TLS via certificate resolver"
        default: false
        required: false
      cert_resolver:
        type: str
        description: "Traefik certificate resolver name"
        default: cloudflare
        required: false
        needs:
          - traefik_tls_enabled=true

  volume:
    title: Volume
    vars:
      volume_mode:
        type: enum
        description: "Application data volume mode (data + media)"
        options: [local, mount, nfs]
        default: local
        required: true
      volume_mount_path:
        type: str
        description: "Host base path for bind mounts (data/ and media/ subdirs will be created)"
        default: /mnt/storage
        required: true
        needs:
          - volume_mode=mount
      volume_nfs_server:
        type: str
        description: "NFS server address"
        default: 192.168.1.1
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_path:
        type: str
        description: "NFS export base path (data/ and media/ subdirs must exist)"
        default: /export
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_options:
        type: str
        description: "NFS mount options"
        default: rw,nolock,soft
        required: true
        needs:
          - volume_mode=nfs

  ports:
    title: Ports
    vars:
      port_http:
        type: int
        description: "HTTP port (used when Traefik is disabled)"
        default: 8000
        required: false

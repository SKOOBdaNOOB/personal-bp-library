kind: compose
schema: "1.2"

metadata:
  name: fresh-rss
  description: |
    Self-hosted RSS feed aggregator.
    [Documentation](https://freshrss.github.io/FreshRSS/) · [Repository](https://github.com/FreshRSS/FreshRSS)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [rss, news, selfhosted, reader]
  icon:
    provider: selfh
    id: fresh-rss
  draft: true

spec:
  general:
    title: General
    vars:
      service_name:
        type: str
        description: "Container name"
        default: freshrss
        required: false
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: unless-stopped
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  configuration:
    title: Configuration
    vars:
      timezone:
        type: str
        description: "Timezone for the container (tz database format)"
        default: America/New_York
        required: false
      cron_min:
        type: str
        description: "Cron schedule minutes for feed refresh (e.g. 4,34 for twice per hour)"
        default: "4,34"
        required: false

  traefik:
    title: Traefik
    toggle: traefik_enabled
    vars:
      traefik_enabled:
        type: bool
        description: "Enable Traefik reverse proxy integration"
        default: true
        required: false
      traefik_host:
        type: str
        description: "Subdomain for Traefik routing (e.g. rss)"
        default: rss
        required: false
        needs:
          - traefik_enabled=true
      traefik_domain:
        type: str
        description: "Base domain for Traefik routing (e.g. home.example.com)"
        default: home.example.com
        required: false
        needs:
          - traefik_enabled=true
      traefik_network:
        type: str
        description: "External Traefik network name"
        default: proxy
        required: false
        needs:
          - traefik_enabled=true

  traefik_tls:
    title: Traefik TLS
    toggle: traefik_tls_enabled
    needs: traefik
    vars:
      traefik_tls_enabled:
        type: bool
        description: "Enable TLS via certificate resolver"
        default: false
        required: false
      cert_resolver:
        type: str
        description: "Traefik certificate resolver name"
        default: cloudflare
        required: false
        needs:
          - traefik_tls_enabled=true

  ports:
    title: Ports
    vars:
      port_http:
        type: int
        description: "HTTP port (used when Traefik is disabled)"
        default: 8080
        required: false

version: 1.2
service:
  name: fresh-rss
  description: "Self-hosted RSS feed aggregator"
  author: "Stephen Delisser"
  date: 2026-03-13
  tags: [rss, news, selfhosted, reader]
  icon: selfhosted
  links:
    documentation: "https://freshrss.github.io/FreshRSS/"
    repository: "https://github.com/FreshRSS/FreshRSS"

specification:
  - General:
      - service_name:
          type: string
          description: "Container name"
          default: freshrss
          required: false
      - restart_policy:
          type: enum
          description: "Docker restart policy"
          default: unless-stopped
          options: [always, unless-stopped, on-failure, "no"]
          required: false

  - Configuration:
      - timezone:
          type: string
          description: "Timezone for the container (tz database format)"
          default: America/New_York
          required: false
      - cron_min:
          type: string
          description: "Cron schedule minutes for feed refresh (e.g. 4,34 for twice per hour)"
          default: "4,34"
          required: false

  - Traefik:
      - traefik_enabled:
          type: bool
          description: "Enable Traefik reverse proxy integration"
          default: true
          required: false
      - traefik_host:
          type: string
          description: "Subdomain for Traefik routing (e.g. rss)"
          default: rss
          required: false
      - traefik_domain:
          type: string
          description: "Base domain for Traefik routing (e.g. home.example.com)"
          default: home.example.com
          required: false
      - traefik_network:
          type: string
          description: "External Traefik network name"
          default: proxy
          required: false
      - cert_resolver:
          type: string
          description: "Traefik certificate resolver name"
          default: cloudflare
          required: false

  - Ports:
      - port_http:
          type: int
          description: "HTTP port (used when Traefik is disabled)"
          default: 8080
          required: false

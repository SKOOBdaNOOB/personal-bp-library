version: 1.2
service:
  name: open-webui
  description: "Web UI for interacting with Ollama and other OpenAI-compatible LLM backends"
  author: "Stephen Delisser"
  date: 2026-03-13
  tags: [ai, llm, ollama, selfhosted, webui]
  icon: selfhosted
  links:
    documentation: "https://docs.openwebui.com/"
    repository: "https://github.com/open-webui/open-webui"

specification:
  - General:
      - service_name:
          type: string
          description: "Container name"
          default: open-webui
          required: false
      - restart_policy:
          type: enum
          description: "Docker restart policy"
          default: always
          options: [always, unless-stopped, on-failure, "no"]
          required: false

  - Configuration:
      - ollama_base_url:
          type: string
          description: "Base URL of the Ollama instance (e.g. http://10.0.12.40:11434)"
          default: http://localhost:11434
          required: true

  - Traefik:
      - traefik_enabled:
          type: bool
          description: "Enable Traefik reverse proxy integration"
          default: true
          required: false
      - traefik_host:
          type: string
          description: "Subdomain for Traefik routing (e.g. webui)"
          default: webui
          required: false
      - traefik_domain:
          type: string
          description: "Base domain for Traefik routing (e.g. home.example.com)"
          default: home.example.com
          required: false
      - traefik_network:
          type: string
          description: "External Traefik network name"
          default: proxy
          required: false
      - cert_resolver:
          type: string
          description: "Traefik certificate resolver name"
          default: cloudflare
          required: false

  - Ports:
      - port_http:
          type: int
          description: "HTTP port (used when Traefik is disabled)"
          default: 8080
          required: false

kind: compose
schema: "1.2"

metadata:
  name: cloudflared
  description: |
    Cloudflare Tunnel client for securely exposing local services without opening firewall ports.
    [Documentation](https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/) · [Repository](https://github.com/cloudflare/cloudflared)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [cloudflare, tunnel, network, proxy]
  icon:
    provider: selfh
    id: cloudflared
  draft: false

spec:
  general:
    title: General
    vars:
      service_name:
        type: str
        description: "Container name"
        default: cloudflared
        required: false
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: unless-stopped
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  tunnel:
    title: Tunnel
    vars:
      tunnel_token:
        type: str
        description: "Cloudflare Tunnel token (from Cloudflare Zero Trust dashboard)"
        default: ""
        required: true
        sensitive: true

  network:
    title: Network
    vars:
      proxy_network:
        type: str
        description: "External proxy network to attach the tunnel to"
        default: proxy
        required: false

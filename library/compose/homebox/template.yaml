version: 1.2
service:
  name: homebox
  description: "Self-hosted home inventory and organization system"
  author: "Stephen Delisser"
  date: 2026-03-13
  tags: [inventory, home, selfhosted]
  icon: selfhosted
  links:
    documentation: "https://hay-kot.github.io/homebox/"
    repository: "https://github.com/hay-kot/homebox"

specification:
  - General:
      - service_name:
          type: string
          description: "Container name"
          default: homebox
          required: false
      - restart_policy:
          type: enum
          description: "Docker restart policy"
          default: always
          options: [always, unless-stopped, on-failure, "no"]
          required: false

  - Configuration:
      - log_level:
          type: enum
          description: "Application log level"
          default: info
          options: [debug, info, warn, error]
          required: false
      - log_format:
          type: enum
          description: "Application log format"
          default: text
          options: [text, json]
          required: false
      - max_upload_size:
          type: int
          description: "Maximum file upload size in MB"
          default: 10
          required: false

  - Traefik:
      - traefik_enabled:
          type: bool
          description: "Enable Traefik reverse proxy integration"
          default: true
          required: false
      - traefik_host:
          type: string
          description: "Subdomain for Traefik routing (e.g. things)"
          default: things
          required: false
      - traefik_domain:
          type: string
          description: "Base domain for Traefik routing (e.g. home.example.com)"
          default: home.example.com
          required: false
      - traefik_network:
          type: string
          description: "External Traefik network name"
          default: proxy
          required: false
      - cert_resolver:
          type: string
          description: "Traefik certificate resolver name"
          default: cloudflare
          required: false

  - Ports:
      - port_http:
          type: int
          description: "HTTP port (used when Traefik is disabled)"
          default: 7745
          required: false

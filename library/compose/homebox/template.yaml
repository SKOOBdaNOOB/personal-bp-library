kind: compose
schema: "1.2"

metadata:
  name: homebox
  description: |
    Self-hosted home inventory and organization system.
    [Documentation](https://hay-kot.github.io/homebox/) · [Repository](https://github.com/hay-kot/homebox)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [inventory, home, selfhosted]
  icon:
    provider: selfh
    id: homebox
  draft: false

spec:
  general:
    title: General
    vars:
      service_name:
        type: str
        description: "Container name"
        default: homebox
        required: false
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: always
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  configuration:
    title: Configuration
    vars:
      log_level:
        type: enum
        description: "Application log level"
        default: info
        options: [debug, info, warn, error]
        required: false
      log_format:
        type: enum
        description: "Application log format"
        default: text
        options: [text, json]
        required: false
      max_upload_size:
        type: int
        description: "Maximum file upload size in MB"
        default: 10
        required: false

  traefik:
    title: Traefik
    toggle: traefik_enabled
    vars:
      traefik_enabled:
        type: bool
        description: "Enable Traefik reverse proxy integration"
        default: true
        required: false
      traefik_host:
        type: str
        description: "Subdomain for Traefik routing (e.g. things)"
        default: things
        required: false
        needs:
          - traefik_enabled=true
      traefik_domain:
        type: str
        description: "Base domain for Traefik routing (e.g. home.example.com)"
        default: home.example.com
        required: false
        needs:
          - traefik_enabled=true
      traefik_network:
        type: str
        description: "External Traefik network name"
        default: proxy
        required: false
        needs:
          - traefik_enabled=true

  traefik_tls:
    title: Traefik TLS
    toggle: traefik_tls_enabled
    needs: traefik
    vars:
      traefik_tls_enabled:
        type: bool
        description: "Enable TLS via certificate resolver"
        default: false
        required: false
      cert_resolver:
        type: str
        description: "Traefik certificate resolver name"
        default: cloudflare
        required: false
        needs:
          - traefik_tls_enabled=true

  volume:
    title: Volume
    vars:
      volume_mode:
        type: enum
        description: "Data volume mode"
        options: [local, mount, nfs]
        default: local
        required: true
      volume_mount_path:
        type: str
        description: "Host path for bind mount"
        default: /mnt/storage
        required: true
        needs:
          - volume_mode=mount
      volume_nfs_server:
        type: str
        description: "NFS server address"
        default: 192.168.1.1
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_path:
        type: str
        description: "NFS export path"
        default: /export
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_options:
        type: str
        description: "NFS mount options"
        default: rw,nolock,soft
        required: true
        needs:
          - volume_mode=nfs

  ports:
    title: Ports
    vars:
      port_http:
        type: int
        description: "HTTP port (used when Traefik is disabled)"
        default: 7745
        required: false

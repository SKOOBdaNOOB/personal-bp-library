kind: compose
schema: "1.2"

metadata:
  name: lancache
  description: |
    LAN caching server for game downloads (Steam, Epic, etc.) using DNS redirection.
    [Documentation](https://lancache.net/) · [Repository](https://github.com/lancachenet/docker-compose)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [gaming, cache, dns, network, lan]
  icon:
    provider: selfh
    id: lancache
  draft: false

spec:
  general:
    title: General
    vars:
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: "no"
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  network:
    title: Network
    vars:
      use_generic_cache:
        type: bool
        description: "Use monolithic/generic cache (true) or separate IPs per service (false)"
        default: true
        required: false
      lancache_ip:
        type: str
        description: "IP address the lancache monolithic instance is reachable on"
        default: 10.0.17.10
        required: true
      dns_bind_ip:
        type: str
        description: "IP address the DNS server should bind to"
        default: 10.0.17.10
        required: true
      upstream_dns:
        type: str
        description: "Upstream DNS server for non-cached lookups"
        default: 1.1.1.1
        required: false

  volume:
    title: Volume
    vars:
      volume_mode:
        type: enum
        description: "Cache storage volume mode"
        options: [local, mount, nfs]
        default: mount
        required: true
      volume_mount_path:
        type: str
        description: "Host path for bind mount (recommended for large caches)"
        default: /mnt/lancache
        required: true
        needs:
          - volume_mode=mount
      volume_nfs_server:
        type: str
        description: "NFS server address"
        default: 192.168.1.1
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_path:
        type: str
        description: "NFS export path"
        default: /export
        required: true
        needs:
          - volume_mode=nfs
      volume_nfs_options:
        type: str
        description: "NFS mount options"
        default: rw,nolock,soft
        required: true
        needs:
          - volume_mode=nfs

  cache:
    title: Cache
    vars:
      cache_disk_size:
        type: str
        description: "Maximum disk cache size (e.g. 4000g, 1t)"
        default: 4000g
        required: false
      min_free_disk:
        type: str
        description: "Minimum free disk space to maintain at all times"
        default: 10g
        required: false
      cache_index_size:
        type: str
        description: "Nginx cache manager index memory (250m per 1TB of cache recommended)"
        default: 500m
        required: false
      cache_max_age:
        type: str
        description: "Maximum age of cached content before expiry"
        default: 3650d
        required: false

  configuration:
    title: Configuration
    vars:
      timezone:
        type: str
        description: "Timezone for the containers (tz database format)"
        default: America/New_York
        required: false

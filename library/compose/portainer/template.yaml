kind: compose
schema: "1.2"

metadata:
  name: portainer
  description: |
    Container management UI for Docker and Docker Swarm.
    [Documentation](https://docs.portainer.io/) · [Repository](https://github.com/portainer/portainer)
  author: "Stephen Delisser"
  date: "2026-03-13"
  version: "latest"
  tags: [docker, management, selfhosted, admin]
  icon:
    provider: selfh
    id: portainer
  draft: true

spec:
  general:
    title: General
    vars:
      service_name:
        type: str
        description: "Container name"
        default: portainer
        required: false
      restart_policy:
        type: enum
        description: "Docker restart policy"
        default: unless-stopped
        options: [always, unless-stopped, on-failure, "no"]
        required: false

  traefik:
    title: Traefik
    toggle: traefik_enabled
    vars:
      traefik_enabled:
        type: bool
        description: "Enable Traefik reverse proxy integration"
        default: true
        required: false
      traefik_host:
        type: str
        description: "Subdomain for Traefik routing (e.g. portainer)"
        default: portainer
        required: false
        needs:
          - traefik_enabled=true
      traefik_domain:
        type: str
        description: "Base domain for Traefik routing (e.g. home.example.com)"
        default: home.example.com
        required: false
        needs:
          - traefik_enabled=true
      traefik_network:
        type: str
        description: "External Traefik network name"
        default: proxy
        required: false
        needs:
          - traefik_enabled=true

  traefik_tls:
    title: Traefik TLS
    toggle: traefik_tls_enabled
    needs: traefik
    vars:
      traefik_tls_enabled:
        type: bool
        description: "Enable TLS via certificate resolver"
        default: false
        required: false
      cert_resolver:
        type: str
        description: "Traefik certificate resolver name"
        default: cloudflare
        required: false
        needs:
          - traefik_tls_enabled=true

  ports:
    title: Ports
    vars:
      port_http:
        type: int
        description: "HTTP port (used when Traefik is disabled)"
        default: 9000
        required: false

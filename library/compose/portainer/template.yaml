version: 1.2
service:
  name: portainer
  description: "Container management UI for Docker and Docker Swarm"
  author: "Stephen Delisser"
  date: 2026-03-13
  tags: [docker, management, selfhosted, admin]
  icon: selfhosted
  links:
    documentation: "https://docs.portainer.io/"
    repository: "https://github.com/portainer/portainer"

specification:
  - General:
      - service_name:
          type: string
          description: "Container name"
          default: portainer
          required: false
      - restart_policy:
          type: enum
          description: "Docker restart policy"
          default: unless-stopped
          options: [always, unless-stopped, on-failure, "no"]
          required: false

  - Traefik:
      - traefik_enabled:
          type: bool
          description: "Enable Traefik reverse proxy integration"
          default: true
          required: false
      - traefik_host:
          type: string
          description: "Subdomain for Traefik routing (e.g. portainer)"
          default: portainer
          required: false
      - traefik_domain:
          type: string
          description: "Base domain for Traefik routing (e.g. home.example.com)"
          default: home.example.com
          required: false
      - traefik_network:
          type: string
          description: "External Traefik network name"
          default: proxy
          required: false
      - cert_resolver:
          type: string
          description: "Traefik certificate resolver name"
          default: cloudflare
          required: false

  - Ports:
      - port_http:
          type: int
          description: "HTTP port (used when Traefik is disabled)"
          default: 9000
          required: false
